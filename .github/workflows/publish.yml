name: نشر الأخبار 24/7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      max_posts:
        description: 'الحد الأقصى للمنشورات'
        required: false
        default: '30'
        type: string

concurrency:
  group: news-publisher
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: نشر مستمر
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔤 تثبيت الخطوط العربية + libraqm
        run: |
          sudo apt-get update -qq
          # libraqm: مكتبة معالجة النصوص العربية في Pillow
          # fonts-amiri: خط عربي احترافي
          # fonts-noto-core: يحتوي Noto Naskh Arabic
          sudo apt-get install -y --no-install-recommends \
            libraqm0 \
            fonts-amiri \
            fonts-noto-core \
            fonts-noto \
            fonts-kacst \
            fonts-sil-scheherazade \
            fontconfig
          sudo fc-cache -fv
          
          echo "===== ✅ تأكيد تثبيت الخطوط ====="
          ls /usr/share/fonts/truetype/amiri/ 2>/dev/null && echo "✅ Amiri OK" || echo "❌ Amiri FAILED"
          ls /usr/share/fonts/truetype/noto/NotoNaskh*.ttf 2>/dev/null | head -3 && echo "✅ Noto Naskh OK" || echo "❌ Noto Naskh FAILED"
          
          echo "===== 🔍 الخطوط العربية المتاحة ====="
          fc-list :lang=ar family | sort -u | head -10

      - name: 📦 تثبيت مكتبات Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          echo "===== 🔍 تأكيد libraqm في Pillow ====="
          python -c "from PIL import features; print(f'libraqm: {features.check(\"raqm\")}')"

      - name: 💾 استرجاع كاش
        uses: actions/cache/restore@v4
        with:
          path: news_cache_v25.db
          key: news-db-v26-${{ github.run_id }}
          restore-keys: |
            news-db-v26-

      - name: 🚀 تشغيل النشر
        env:
          PAGE_SALSSAL: ${{ secrets.PAGE_SALSSAL }}
          PAGE_CHAI: ${{ secrets.PAGE_CHAI }}
          PAGE_TABOGA: ${{ secrets.PAGE_TABOGA }}
          PAGE_TEIN: ${{ secrets.PAGE_TEIN }}
          NEWS_DB_PATH: news_cache_v25.db
          MAX_POSTS: ${{ inputs.max_posts || '30' }}
        run: |
          timeout 600 python publisher_v25.py --once --max-posts "$MAX_POSTS" || true
          echo "✅ انتهت دورة النشر"

      - name: 💾 حفظ الكاش
        if: always()
        uses: actions/cache/save@v4
        with:
          path: news_cache_v25.db
          key: news-db-v26-${{ github.run_id }}
