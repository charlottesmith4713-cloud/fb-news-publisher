name: نشر الأخبار 24/7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install fonts
        run: |
          sudo add-apt-repository universe -y || true
          sudo apt-get update -qq
          sudo apt-get install -y libraqm0 fonts-noto-core fonts-kacst fontconfig || true
          sudo apt-get install -y fonts-amiri || true
          sudo fc-cache -fv || true

      - name: Install Python
        run: pip install -r requirements.txt

      - uses: actions/cache/restore@v4
        with:
          path: news_cache_v25.db
          key: db-${{ github.run_id }}
          restore-keys: db-

      - name: Run publisher
        env:
          PAGE_SALSSAL: ${{ secrets.PAGE_SALSSAL }}
          PAGE_CHAI: ${{ secrets.PAGE_CHAI }}
          PAGE_TABOGA: ${{ secrets.PAGE_TABOGA }}
          PAGE_TEIN: ${{ secrets.PAGE_TEIN }}
          NEWS_DB_PATH: news_cache_v25.db
        run: timeout 600 python publisher_v25.py --once --max-posts 30 || true

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: news_cache_v25.db
          key: db-${{ github.run_id }}
