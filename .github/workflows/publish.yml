name: نشر الأخبار 24/7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Arabic fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-noto fonts-noto-core fonts-amiri fonts-hosny-amiri \
            fonts-kacst fonts-kacst-one fonts-sil-scheherazade \
            fonts-sil-lateef fontconfig 2>&1 | tail -5 || true
          sudo fc-cache -fv > /dev/null 2>&1 || true

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: news_cache_v25.db
          key: news-db-v26-${{ github.run_id }}
          restore-keys: |
            news-db-v26-
            news-db-v25-

      - name: Run publisher
        env:
          PAGE_SALSSAL: ${{ secrets.PAGE_SALSSAL }}
          PAGE_CHAI: ${{ secrets.PAGE_CHAI }}
          PAGE_TABOGA: ${{ secrets.PAGE_TABOGA }}
          PAGE_TEIN: ${{ secrets.PAGE_TEIN }}
          NEWS_DB_PATH: news_cache_v25.db
        run: |
          timeout 600 python publisher_v25.py --once --max-posts 30 || true
          echo "✅ Done"

      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: news_cache_v25.db
          key: news-db-v26-${{ github.run_id }}
